<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTMCred - Simulador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            max-width: 100%;
            overflow-wrap: break-word;
            min-width: 0;
        }
        html, body {
            overflow-x: hidden !important;
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            touch-action: pan-y;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8F9FA;
            color: #333333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        header, main, footer {
            width: 100% !important;
            max-width: 100% !important;
            margin-left: auto !important;
            margin-right: auto !important;
            overflow-x: hidden !important;
            flex-shrink: 0;
        }
        .bg-fintech-royal {
            background-color: #002BFF;
        }
        .text-fintech-royal {
            color: #002BFF;
        }
        .border-fintech-royal {
            border-color: #002BFF;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .step-transition {
            transition: all 0.3s ease-in-out;
        }
        [data-lucide] {
            width: 24px;
            height: 24px;
        }
        .lucide-large {
            width: 32px;
            height: 32px;
        }
        .lucide-xl {
            width: 48px;
            height: 48px;
        }
        .lucide-small {
            width: 16px;
            height: 16px;
        }
        .lucide-xs {
            width: 14px;
            height: 14px;
        }
        /* Custom styles for consistency with React app */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-fintech-royal pt-10 pb-5 px-6 sticky top-0 z-50 shadow-md">
        <div class="flex items-center justify-between mb-3 max-w-md mx-auto w-full">
            <button id="btn-back" class="p-2 -ml-2 text-white hidden">
                <i data-lucide="chevron-left"></i>
            </button>
            <div id="header-spacer-left" class="w-8"></div>
            <h1 class="font-extrabold text-3xl md:text-4xl tracking-tight text-white leading-none">VTMCred</h1>
            <div id="header-spacer-right" class="w-8"></div>
        </div>
        <div class="flex justify-center" id="header-subtitle-container">
            <!-- Dynamic Content -->
        </div>
    </header>

    <main id="app-container" class="max-w-md mx-auto p-4 flex flex-col flex-1 w-full">
        <!-- Steps will be injected here -->
    </main>

    <footer class="p-8 text-center mt-auto">
        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">VTMCred © 2026</p>
    </footer>

    <script>
        // --- Configuration & Constants ---
        const DISCOUNT_KEY = "VTMCLIENTE4";
        const PHONE_NUMBER = "5593996589790";

        const SLOGAN_PHRASES = [
            "Compromisso claro, Crédito direto.",
            "Simples, rápido e sem burocracia.",
            "Seu limite pode virar dinheiro.",
            "Simule e resolva agora.",
            "Transparência em cada parcela."
        ];

        // --- Scramble Effect Logic ---
        class TextScrambler {
            constructor(el) {
                this.el = el;
                this.chars = '$%&¥€£0123456789#¢______';
                this.update = this.update.bind(this);
            }
            setText(newText) {
                const oldText = this.el.innerText || "";
                const length = Math.max(oldText.length, newText.length);
                const promise = new Promise((resolve) => (this.resolve = resolve));
                this.queue = [];
                for (let i = 0; i < length; i++) {
                    const from = oldText[i] || '';
                    const to = newText[i] || '';
                    const start = Math.floor(Math.random() * 10);
                    const end = start + Math.floor(Math.random() * 20);
                    this.queue.push({ from, to, start, end });
                }
                cancelAnimationFrame(this.frameRequest);
                this.frame = 0;
                this.update();
                return promise;
            }
            update() {
                let output = '';
                let complete = 0;
                for (let i = 0, n = this.queue.length; i < n; i++) {
                    let { from, to, start, end, char } = this.queue[i];
                    if (this.frame >= end) {
                        complete++;
                        output += to;
                    } else if (this.frame >= start) {
                        if (!char || Math.random() < 0.28) {
                            char = this.randomChar();
                            this.queue[i].char = char;
                        }
                        output += `<span class="opacity-40 font-mono">${char}</span>`;
                    } else {
                        output += from;
                    }
                }
                this.el.innerHTML = output;
                if (complete === this.queue.length) {
                    this.resolve();
                } else {
                    this.frameRequest = requestAnimationFrame(this.update);
                    this.frame++;
                }
            }
            randomChar() {
                return this.chars[Math.floor(Math.random() * this.chars.length)];
            }
        }

        let scrambler = null;
        let phraseIndex = 0;
        let sloganInterval = null;

        const startSloganAnimation = () => {
            const el = document.getElementById('animated-slogan');
            if (!el) return;
            
            // Avoid multiple intervals
            if (sloganInterval) return;

            scrambler = new TextScrambler(el);
            
            const nextPhrase = () => {
                scrambler.setText(SLOGAN_PHRASES[phraseIndex]).then(() => {
                    sloganInterval = setTimeout(nextPhrase, 3000);
                });
                phraseIndex = (phraseIndex + 1) % SLOGAN_PHRASES.length;
            };

            nextPhrase();
        };

        const stopSloganAnimation = () => {
            if (sloganInterval) {
                clearTimeout(sloganInterval);
                sloganInterval = null;
            }
            phraseIndex = 0;
            scrambler = null;
        };

        const APROXIMACAO_RATES = {
            1: 0.06, 2: 0.12, 3: 0.18, 4: 0.22, 5: 0.26, 6: 0.29,
            7: 0.31, 8: 0.33, 9: 0.34, 10: 0.348, 11: 0.352, 12: 0.356
        };

        const LINK_RATES = {
            1: 0.07, 2: 0.1422, 3: 0.2089, 4: 0.2530, 5: 0.2968, 6: 0.3294,
            7: 0.3736, 8: 0.4000, 9: 0.4151, 10: 0.4276, 11: 0.4390, 12: 0.4500
        };

        // --- State Management ---
        let state = {
            step: 'hub',
            amount: 0,
            credKey: '',
            selectedInstallment: null,
            cardBrand: '',
            cardBank: '',
            cardMethod: '',
            cardAmount: 0,
            cardInstallment: null
        };

        const setState = (updates) => {
            state = { ...state, ...updates };
            window.scrollTo(0, 0); // Always reset scroll to top on step change
            render();
        };

        // --- Navigation ---
        const goBack = () => {
            const { step, cardMethod } = state;
            if (step === 'welcome' || step === 'card_brand') setState({ step: 'hub' });
            else if (step === 'amount') setState({ step: 'welcome' });
            else if (step === 'key') setState({ step: 'amount' });
            else if (step === 'results') setState({ step: 'key' });
            else if (step === 'card_bank') setState({ step: 'card_brand' });
            else if (step === 'card_method') setState({ step: 'card_bank' });
            else if (step === 'card_amount') setState({ step: 'card_method' });
            else if (step === 'card_results') {
                if (cardMethod === 'Aproximação' || cardMethod === 'Inserir Cartão' || cardMethod === 'Link de Pagamento') setState({ step: 'card_amount' });
                else setState({ step: 'card_method' });
            }
        };

        // --- Logic Helper ---
        const formatBRL = (val) => val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }).replace('R$', 'R$ ');

        const handleCredKeyInput = (val) => {
            state.credKey = val;
            const isKeyActive = state.credKey.toUpperCase() === DISCOUNT_KEY;
            const banner = document.getElementById('credkey-success-banner');
            if (banner) {
                if (isKeyActive) banner.classList.remove('hidden');
                else banner.classList.add('hidden');
            }
        };

        // --- View Injection ---
        let currentRenderedStep = null;

        const render = () => {
            const container = document.getElementById('app-container');
            const subtitleContainer = document.getElementById('header-subtitle-container');
            const btnBack = document.getElementById('btn-back');
            const spacerLeft = document.getElementById('header-spacer-left');

            // Header Logic
            const isCardPath = state.step.startsWith('card_');
            const headerSubtitle = state.step === 'hub' ? 'Compromisso claro. Crédito direto!' : (isCardPath ? 'Simulador Cartão' : 'Simulador de Crédito');
            
            if (state.step === 'hub') {
                btnBack.classList.add('hidden');
                spacerLeft.classList.remove('hidden');
                if (!document.getElementById('animated-slogan')) {
                    subtitleContainer.innerHTML = `<span id="animated-slogan" class="text-white/80 text-[10px] uppercase tracking-[0.15em] font-medium text-center min-h-[1em]"></span>`;
                    startSloganAnimation();
                }
            } else {
                stopSloganAnimation();
                btnBack.classList.remove('hidden');
                spacerLeft.classList.add('hidden');
                // Only update subtitle if it's not the slogan or if subtitle changed
                const currentSubtitleText = subtitleContainer.innerText;
                if (!currentSubtitleText || currentSubtitleText !== headerSubtitle) {
                    subtitleContainer.innerHTML = `
                        <div class="inline-flex bg-white/10 backdrop-blur-sm rounded-full px-3 py-1 items-center gap-2 border border-white/20">
                            <div class="w-4 h-4 rounded-full border-2 border-white flex items-center justify-center">
                                <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
                            </div>
                            <span class="text-white/90 text-xs uppercase tracking-widest leading-none">${headerSubtitle}</span>
                        </div>
                    `;
                }
            }

            // Optimization: Don't re-render the whole app-container if the step hasn't changed
            // This prevents losing focus on inputs while typing if something else calls render()
            if (currentRenderedStep === state.step) {
                // Update specific bits for the current step to keep it interactive without redraw
                if(state.step === 'amount') {
                    const btn = document.getElementById('loan-btn-continue');
                    if(btn) btn.disabled = !state.amount || state.amount <= 0;
                }
                if(state.step === 'key') {
                    const isKeyActive = state.credKey.toUpperCase() === DISCOUNT_KEY;
                    const banner = document.getElementById('credkey-success-banner');
                    if(banner) {
                        if(isKeyActive) banner.classList.remove('hidden');
                        else banner.classList.add('hidden');
                    }
                }
                if(state.step === 'card_amount') {
                    const btn = document.getElementById('card-btn-continue');
                    if(btn) btn.disabled = !state.cardAmount || state.cardAmount <= 0;
                }
                return;
            }
            
            currentRenderedStep = state.step;
            
            // Main Content Area
            let content = '';

            if (state.step === 'hub') {
                content = `
                    <div class="flex flex-col gap-4 py-2 step-transition opacity-100">
                        <div class="text-center mb-1">
                            <p class="text-slate-500 font-medium leading-tight">
                                Simule agora e veja<br>suas opções em segundos.
                            </p>
                        </div>
                        <div class="grid grid-cols-1 gap-4">
                            <button onclick="setState({step: 'welcome'})" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-5 text-left transition-all active:scale-95 group hover:border-[#3483FA]">
                                <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-[#3483FA] shrink-0 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                    <i data-lucide="trending-down" class="lucide-large"></i>
                                </div>
                                <div class="flex-1">
                                    <h3 class="font-bold text-lg text-slate-800">Simulador Crédito</h3>
                                    <p class="text-sm text-slate-500">Taxas claras e análise rápida com responsabilidade.</p>
                                </div>
                                <i data-lucide="chevron-right" class="text-slate-300 lucide-small"></i>
                            </button>
                            <button onclick="setState({step: 'card_brand'})" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-5 text-left transition-all active:scale-95 group hover:border-[#3483FA]">
                                <div class="w-14 h-14 bg-purple-50 rounded-2xl flex items-center justify-center text-purple-600 shrink-0 group-hover:bg-purple-600 group-hover:text-white transition-colors">
                                    <i data-lucide="credit-card" class="lucide-large"></i>
                                </div>
                                <div class="flex-1">
                                    <h3 class="font-bold text-lg text-slate-800">Simulador Cartão</h3>
                                    <p class="text-sm text-slate-500">Converta seu limite em PIX com condições transparentes.</p>
                                </div>
                                <i data-lucide="chevron-right" class="text-slate-300 lucide-small"></i>
                            </button>
                            <div class="bg-slate-100 p-6 rounded-2xl border border-dashed border-slate-300 flex items-center gap-5 text-left opacity-60">
                                <div class="w-14 h-14 bg-slate-200 rounded-2xl flex items-center justify-center text-slate-400 shrink-0">
                                    <i data-lucide="layout-grid" class="lucide-large"></i>
                                </div>
                                <div class="flex-1">
                                    <h3 class="font-bold text-lg text-slate-400">Em breve...</h3>
                                    <p class="text-sm text-slate-400">Novas facilidades para o seu dia a dia.</p>
                                </div>
                                <i data-lucide="lock" class="text-slate-300 lucide-small"></i>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.step === 'welcome') {
                content = `
                    <div class="flex flex-col gap-6 pt-6 step-transition">
                        <section>
                            <div class="bg-white p-8 rounded-2xl border border-slate-100 shadow-xl shadow-blue-900/5">
                                <p class="text-[#333333] text-xl leading-snug mb-8">
                                    Simulação <span class="font-bold text-fintech-royal">transparente</span> em segundos, com condições claras.
                                </p>
                                <button onclick="setState({step: 'amount'})" class="w-full bg-[#3483FA] text-white py-5 rounded-xl font-bold text-lg hover:shadow-lg hover:shadow-blue-200 transition-all uppercase tracking-widest">
                                    SIMULAR AGORA
                                </button>
                            </div>
                        </section>
                        <section class="mt-2">
                            <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4 px-1">Por que a VTMCred?</h2>
                            <div class="grid grid-cols-1 gap-3">
                                <div class="bg-white p-5 rounded-xl border border-slate-100 flex items-center gap-4">
                                    <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-fintech-royal shrink-0">
                                        <i data-lucide="trending-down"></i>
                                    </div>
                                    <div>
                                        <p class="font-bold text-slate-800">Condições Transparentes</p>
                                        <p class="text-sm text-slate-500">Condições a partir de <span class="font-bold">15%</span> ao mês.</p>
                                    </div>
                                </div>
                                <div class="bg-white p-5 rounded-xl border border-slate-100 flex items-center gap-4">
                                    <div class="w-12 h-12 bg-green-50 rounded-full flex items-center justify-center text-green-600 shrink-0">
                                        <i data-lucide="check-circle-2"></i>
                                    </div>
                                    <div>
                                        <p class="font-bold text-slate-800">Atendimento Rápido e Digital</p>
                                        <p class="text-sm text-slate-500">Atendimento rápido e direto via WhatsApp.</p>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                `;
            } else if (state.step === 'amount') {
                content = `
                    <div class="flex-1 flex flex-col gap-6 step-transition">
                        <h2 class="text-lg font-bold px-1 text-slate-400 uppercase tracking-tighter">Início</h2>
                        <div class="bg-white p-8 rounded-2xl border border-slate-100 shadow-xl shadow-blue-900/5">
                            <p class="text-slate-600 text-lg mb-8 leading-relaxed">Que valor foi disponibilizado pra você?</p>
                            <div class="relative border-b-2 border-fintech-royal py-2 mb-10 group">
                                <span class="text-2xl font-bold mr-2 text-fintech-royal">R$</span>
                                <input id="loan-amount-input" type="number" placeholder="0,00" value="${state.amount || ''}" oninput="state.amount = Number(this.value); document.getElementById('loan-btn-continue').disabled = !state.amount || state.amount <= 0" class="w-full bg-transparent text-4xl font-black focus:outline-none placeholder:text-slate-100">
                            </div>
                            <button id="loan-btn-continue" onclick="if(state.amount > 0) setState({step: 'key'})" ${(!state.amount || state.amount <= 0) ? 'disabled' : ''} class="w-full bg-fintech-royal text-white py-5 rounded-xl font-bold transition-all disabled:opacity-30 flex items-center justify-center gap-2 shadow-lg shadow-blue-200">
                                Continuar <i data-lucide="chevron-right" class="lucide-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
            } else if (state.step === 'key') {
                const isKeyActive = state.credKey.toUpperCase() === DISCOUNT_KEY;
                content = `
                    <div class="flex-1 flex flex-col gap-6 step-transition">
                        <div class="bg-white p-6 rounded-lg border border-slate-200 shadow-sm mt-4">
                            <div class="flex items-center gap-3 mb-4 text-[#3483FA]">
                                <i data-lucide="ticket"></i>
                                <span class="font-bold">Possui uma CredKey?</span>
                            </div>
                            <input type="text" placeholder="DIGITE SUA CHAVE" value="${state.credKey}" oninput="handleCredKeyInput(this.value)" class="w-full border-2 border-slate-100 rounded-lg p-4 mb-4 text-center font-bold uppercase focus:border-[#3483FA] outline-none transition-colors">
                            <div id="credkey-success-banner" class="mb-6 p-3 bg-green-50 text-green-700 rounded-md text-xs font-bold border border-green-100 flex items-center gap-2 ${isKeyActive ? '' : 'hidden'}">
                                <i data-lucide="check-circle-2" class="lucide-xs"></i> Key Ativada! Desconto Aplicado
                            </div>
                            <div class="flex flex-col gap-3">
                                <button onclick="setState({step: 'results'})" class="w-full bg-[#3483FA] text-white py-4 rounded-md font-bold">Ver simulação</button>
                                <button onclick="setState({credKey: '', step: 'results'})" class="w-full text-[#3483FA] font-bold text-sm py-2">Não tenho uma CredKey</button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.step === 'results') {
                const baseRate = state.amount < 1000 ? 0.20 : 0.15;
                const currentRate = state.credKey.toUpperCase() === DISCOUNT_KEY ? baseRate - 0.04 : baseRate;
                const maxInst = state.amount < 1000 ? 5 : 12;
                
                const simList = Array.from({ length: maxInst }, (_, i) => {
                    const months = i + 1;
                    const total = Math.round(state.amount * (1 + currentRate * months));
                    const inst = Math.round(total / months);
                    return { months, total, inst };
                });

                content = `
                    <div class="flex-1 flex flex-col gap-4 step-transition">
                        <header class="px-1 flex justify-between items-center mb-2">
                            <h2 class="text-xl font-bold">Simulação</h2>
                            <div class="text-[#3483FA] flex items-center gap-1">
                                <i data-lucide="info" class="lucide-small"></i>
                                <span class="text-xs font-bold font-mono">${(currentRate * 100).toFixed(0)}% a.m.</span>
                            </div>
                        </header>
                        <div class="bg-white p-4 rounded-lg border border-slate-200 shadow-sm mb-2">
                            <div class="flex justify-between items-center">
                                <span class="text-slate-400 text-sm font-bold uppercase">VALOR TOTAL</span>
                                <span class="text-lg font-bold">${formatBRL(state.amount)}</span>
                            </div>
                        </div>
                        <p class="text-[13px] text-slate-500 font-medium px-1 mb-4 leading-relaxed">Selecione o parcelamento que deseja e clique em Enviar pelo WhatsApp.</p>
                        <div class="flex flex-col gap-2 overflow-y-auto max-h-[420px] pr-1 custom-scrollbar">
                            ${simList.map(sim => `
                                <div onclick="setState({selectedInstallment: ${sim.months}})" class="bg-white p-4 rounded-lg border transition-all active:scale-[0.98] cursor-pointer ${state.selectedInstallment === sim.months ? 'border-[#3483FA] ring-1 ring-[#3483FA]' : 'border-slate-200'}">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="text-md font-bold">${sim.months}x Parcelas</span>
                                        <span class="text-xs text-slate-400">Total: ${formatBRL(sim.total)}</span>
                                    </div>
                                    <div class="text-2xl font-bold text-[#333333]">${formatBRL(sim.inst)}</div>
                                </div>
                            `).join('')}
                        </div>
                        ${state.selectedInstallment ? `
                            <div class="mt-auto pt-6 border-t border-slate-200">
                                <button onclick="handleSendWA()" class="w-full bg-[#25D366] text-white py-5 rounded-md flex items-center justify-center gap-3 text-lg font-bold shadow-lg active:scale-95 transition-all">
                                    <i data-lucide="message-circle" class="lucide-large"></i> Enviar pelo WhatsApp
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            } else if (state.step === 'card_brand') {
                const brands = ['Visa', 'Mastercard', 'Elo', 'American Express', 'Hipercard', 'Outra'];
                content = `
                    <div class="flex flex-col gap-6 pt-6 step-transition">
                        <h2 class="text-lg font-bold px-1 text-slate-400 uppercase tracking-tight">Qual a bandeira?</h2>
                        <div class="grid grid-cols-2 gap-3">
                            ${brands.map(brand => `
                                <button onclick="setState({cardBrand: '${brand}', step: 'card_bank'})" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm font-bold text-slate-700 hover:border-[#3483FA] active:scale-95 transition-all text-center">
                                    ${brand}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (state.step === 'card_bank') {
                const banks = ['Banco do Brasil', 'Itaú', 'Bradesco', 'Santander', 'Nubank', 'Caixa', 'Inter', 'Outro'];
                content = `
                    <div class="flex flex-col gap-6 pt-6 step-transition">
                        <h2 class="text-lg font-bold px-1 text-slate-400 uppercase tracking-tight">Qual o banco?</h2>
                        <div class="grid grid-cols-1 gap-3">
                            ${banks.map(bank => `
                                <button onclick="setState({cardBank: '${bank}', step: 'card_method'})" class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between font-bold text-slate-700 hover:border-[#3483FA] active:scale-95 transition-all">
                                    <div class="flex items-center gap-3">
                                        <i data-lucide="building-2" class="text-slate-400 lucide-small"></i>
                                        ${bank}
                                    </div>
                                    <i data-lucide="chevron-right" class="text-slate-300 lucide-small"></i>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (state.step === 'card_method') {
                const methods = [
                    { id: 'aproximacao', label: 'Aproximação', color: 'text-yellow-500', icon: 'zap' },
                    { id: 'inserir', label: 'Inserir Cartão', color: 'text-blue-500', icon: 'credit-card' },
                    { id: 'link', label: 'Link de Pagamento', color: 'text-purple-500', icon: 'smartphone' }
                ];
                content = `
                    <div class="flex flex-col gap-6 pt-6 step-transition">
                        <h2 class="text-lg font-bold px-1 text-slate-400 uppercase tracking-tight">COMO VOCÊ VAI PASSAR SEU CARTÃO?</h2>
                        <div class="grid grid-cols-1 gap-4">
                            ${methods.map(m => `
                                <button onclick="setState({cardMethod: '${m.label}', step: 'card_amount'})" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-5 text-left transition-all active:scale-95 group hover:border-[#3483FA]">
                                    <div class="w-12 h-12 bg-slate-50 rounded-xl flex items-center justify-center shrink-0 group-hover:bg-blue-50 transition-colors">
                                        <i data-lucide="${m.icon}" class="${m.color}"></i>
                                    </div>
                                    <div class="flex-1">
                                        <h3 class="font-bold text-lg text-slate-800">${m.label}</h3>
                                    </div>
                                    <i data-lucide="chevron-right" class="text-slate-300"></i>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (state.step === 'card_amount') {
                content = `
                    <div class="flex-1 flex flex-col gap-6 step-transition">
                        <h2 class="text-lg font-bold px-1 text-slate-400 uppercase tracking-tighter">Valor</h2>
                        <div class="bg-white p-8 rounded-2xl border border-slate-100 shadow-xl shadow-blue-900/5">
                            <p class="text-slate-600 text-lg mb-8 leading-relaxed">Quanto você quer usar do seu limite?</p>
                            <div class="relative border-b-2 border-fintech-royal py-2 mb-10 group">
                                <span class="text-2xl font-bold mr-2 text-fintech-royal">R$</span>
                                <input id="card-amount-input" type="number" placeholder="0,00" value="${state.cardAmount || ''}" oninput="state.cardAmount = Number(this.value); document.getElementById('card-btn-continue').disabled = !state.cardAmount || state.cardAmount <= 0" class="w-full bg-transparent text-4xl font-black focus:outline-none placeholder:text-slate-100">
                            </div>
                            <button id="card-btn-continue" onclick="if(state.cardAmount > 0) setState({step: 'card_results'})" ${(!state.cardAmount || state.cardAmount <= 0) ? 'disabled' : ''} class="w-full bg-fintech-royal text-white py-5 rounded-xl font-bold transition-all disabled:opacity-30 flex items-center justify-center gap-2 shadow-lg shadow-blue-200">
                                Continuar <i data-lucide="chevron-right" class="lucide-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
            } else if (state.step === 'card_results') {
                const isSpecial = state.cardMethod === 'Aproximação' || state.cardMethod === 'Inserir Cartão' || state.cardMethod === 'Link de Pagamento';
                const rates = state.cardMethod === 'Link de Pagamento' ? LINK_RATES : APROXIMACAO_RATES;
                
                content = `
                    <div class="flex flex-col gap-6 pt-6 step-transition">
                        <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-xl">
                            <div class="w-20 h-20 bg-green-50 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="check-circle-2" class="lucide-xl"></i>
                            </div>
                            <h2 class="text-2xl font-bold text-slate-800 mb-2 text-center">Simulação Pronta!</h2>
                            <div class="space-y-3 mb-8 text-left bg-slate-50 p-4 rounded-xl border border-slate-100">
                                <div class="flex justify-between text-sm">
                                    <span class="text-slate-400 font-bold uppercase">Bandeira:</span>
                                    <span class="font-bold text-slate-700">${state.cardBrand}</span>
                                </div>
                                <div class="flex justify-between text-sm">
                                    <span class="text-slate-400 font-bold uppercase">Banco:</span>
                                    <span class="font-bold text-slate-700">${state.cardBank}</span>
                                </div>
                                <div class="flex justify-between text-sm">
                                    <span class="text-slate-400 font-bold uppercase">Método:</span>
                                    <span class="font-bold text-slate-700">${state.cardMethod}</span>
                                </div>
                                ${state.cardAmount > 0 ? `
                                    <div class="flex justify-between text-sm border-t border-slate-200 pt-2 mt-2">
                                        <span class="text-slate-400 font-bold uppercase">Limite Utilizado:</span>
                                        <span class="font-bold text-fintech-royal">${formatBRL(state.cardAmount)}</span>
                                    </div>
                                ` : ''}
                            </div>
                            
                            ${(isSpecial && state.cardAmount > 0) ? `
                                <div class="space-y-4">
                                    <p class="text-sm text-slate-500 font-bold uppercase tracking-widest text-left px-1">Selecione o parcelamento:</p>
                                    <div class="flex flex-col gap-2 max-h-[300px] overflow-y-auto pr-1">
                                        ${Object.entries(rates).map(([months, rate]) => {
                                            const m = Number(months);
                                            const total = state.cardAmount * (1 + rate);
                                            const instValue = total / m;
                                            return `
                                                <div onclick="setState({cardInstallment: ${m}})" class="p-4 rounded-xl border-2 transition-all cursor-pointer text-left ${state.cardInstallment === m ? 'border-fintech-royal bg-blue-50' : 'border-slate-100 hover:border-slate-200'}">
                                                    <div class="flex justify-between items-center mb-1">
                                                        <span class="font-black text-lg">${m}x de ${formatBRL(instValue)}</span>
                                                        <span class="text-[10px] font-bold text-slate-400 uppercase">Total: ${formatBRL(total)}</span>
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                    <button onclick="handleSendCardWA()" ${!state.cardInstallment ? 'disabled' : ''} class="w-full bg-[#25D366] text-white py-5 rounded-xl flex items-center justify-center gap-3 text-lg font-bold shadow-lg active:scale-95 transition-all disabled:opacity-50 mt-4">
                                        <i data-lucide="message-circle" class="lucide-large"></i> Chamar no WhatsApp
                                    </button>
                                </div>
                            ` : `
                                <button onclick="handleSendCardWA()" class="w-full bg-[#25D366] text-white py-5 rounded-xl flex items-center justify-center gap-3 text-lg font-bold shadow-lg active:scale-95 transition-all">
                                    <i data-lucide="message-circle" class="lucide-large"></i> Chamar no WhatsApp
                                </button>
                            `}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = content;
            lucide.createIcons(); // Re-initialize icons
        };

        // --- Event Handlers ---
        document.getElementById('btn-back').addEventListener('click', goBack);

        const handleSendWA = () => {
            const baseRate = state.amount < 1000 ? 0.20 : 0.15;
            const currentRate = state.credKey.toUpperCase() === DISCOUNT_KEY ? baseRate - 0.04 : baseRate;
            const months = state.selectedInstallment;
            const total = Math.round(state.amount * (1 + currentRate * months));
            const inst = Math.round(total / months);
            
            const msg = `Fiz a minha simulação e escolhi pagar com *${months} parcelas de ${formatBRL(inst)}*.\n\n*[VTMCred Simulador]*`;
            window.open(`https://wa.me/${PHONE_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        const handleSendCardWA = () => {
            let msg = '';
            if (state.cardInstallment) {
                const m = state.cardInstallment;
                const rates = state.cardMethod === 'Link de Pagamento' ? LINK_RATES : APROXIMACAO_RATES;
                const rate = rates[m];
                const total = state.cardAmount * (1 + rate);
                const instValue = total / m;
                msg = `Olá! Fiz uma simulação de CARTÃO (${state.cardMethod.toUpperCase()}) no VTMCred:\n\n*Limite:* ${formatBRL(state.cardAmount)}\n*Bandeira:* ${state.cardBrand}\n*Banco:* ${state.cardBank}\n*Parcelado em:* ${m}x de ${formatBRL(instValue)}\n*Total:* ${formatBRL(total)}\n\n*[VTMCred Simulador Cartão]*`;
            } else {
                msg = `Olá! Fiz uma simulação de CARTÃO no VTMCred:\n\n*Bandeira:* ${state.cardBrand}\n*Banco:* ${state.cardBank}\n*Método:* ${state.cardMethod}\n\n*[VTMCred Simulador Cartão]*`;
            }
            window.open(`https://wa.me/${PHONE_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        // --- Initial Render ---
        render();
    </script>
</body>
</html>
